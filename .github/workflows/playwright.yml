name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests against'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
  schedule:
    - cron: '0 1 * * *'
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests (all browsers)
        if: github.event_name != 'workflow_dispatch'
        run: npx playwright test
        env:
          PICSIO_EMAIL: ${{ secrets.PICSIO_EMAIL }}
          PICSIO_PASSWORD: ${{ secrets.PICSIO_PASSWORD }}
          PICSIO_BASE_URL: ${{ secrets.PICSIO_BASE_URL }}
          CI: true

      - name: Run Playwright tests (selected browser)
        if: github.event_name == 'workflow_dispatch'
        run: npx playwright test --project=${{ inputs.browser }}
        env:
          PICSIO_EMAIL: ${{ secrets.PICSIO_EMAIL }}
          PICSIO_PASSWORD: ${{ secrets.PICSIO_PASSWORD }}
          PICSIO_BASE_URL: ${{ secrets.PICSIO_BASE_URL }}
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30